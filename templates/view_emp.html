<!DOCTYPE html>
<html>
<head>
    <title>Employees</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 30px;
        }
        .box {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
            width: 90%;
            margin: auto;
        }
        h2 {
            color: #2a5298;
            text-align: center;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }
        th {
            background-color: #2a5298;
            color: white;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Employees</h2>
    <table>
        <tr>
            <th>Employee ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Job Role</th>
            <th>Experience</th>
        </tr>
        {% for emp in employees %}
        <tr>
            <td>{{ emp.employee_id }}</td>
            <td>{{ emp.full_name }}</td>
            <td>{{ emp.department }}</td>
            <td>{{ emp.job_role }}</td>
            <td>{{ emp.work_experience }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="5">No employees found.</td></tr>
        {% endfor %}
    </table>
</div>
</body>
</html>
