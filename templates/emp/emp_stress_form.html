<!DOCTYPE html>
<html>
<head>
<title>Mental Health Assessment</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
padding:40px;
}

.box{
width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0px 5px 20px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px;
width:100%;
background:#2a5298;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

.info{
background:#eef3ff;
padding:10px;
border-radius:5px;
margin-bottom:15px;
}

</style>
</head>

<body>

<div class="box">

<h2>Mental Health Assessment</h2>

<form method="POST">

{% csrf_token %}

<!-- Auto Filled Values -->

<div class="info">
<b>Work Experience:</b> {{ profile.work_experience }} years
</div>

<div class="info">
<b>Work Hours per Week:</b> {{ total_allocated_hours }}
</div>

<!-- Hidden values sent to backend -->

<input type="hidden" name="work_experience" value="{{ profile.work_experience }}">
<input type="hidden" name="work_hours_per_week" value="{{ total_allocated_hours }}">

<!-- User Inputs -->

<label>Remote Work</label>
<select name="remote_work" required>
<option value="">Select</option>
<option value="0">No</option>
<option value="1">Yes</option>
</select>

<label>Workload Score (1-10)</label>
<input type="number" step="0.1" name="workload_score" required>

<label>Job Satisfaction (1-10)</label>
<input type="number" step="0.1" name="job_satisfaction" required>

<label>Sleep Hours</label>
<input type="number" step="0.1" name="sleep_hours" required>

<label>Physical Activity (Hours per Week)</label>
<input type="number" step="0.1" name="physical_activity_hrs" required>

<label>Caffeine Intake</label>
<input type="number" step="0.1" name="caffeine_intake" required>

<label>Stress Level (1-10)</label>
<input type="number" step="0.1" name="stress_level" required>

<button type="submit">Predict Stress Level</button>

</form>

</div>

</body>
</html>
