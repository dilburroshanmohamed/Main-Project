<!DOCTYPE html>
<html>
<head>
    <title>Allocate Employees to Project</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f4f6f9, #dbeafe, #fef3c7);
            margin: 0;
            padding: 40px;
        }       

        .form-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
            width: 600px;
            margin: auto;
        }

        h2 {
            text-align: center;
            background: linear-gradient(90deg, #2a5298, #17a2b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 26px;
            margin-bottom: 20px;
        }

        h3 {
            color: #d97706;
            margin-top: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #1e3c72;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        select:focus, input[type="number"]:focus {
            border-color: #17a2b8;
            outline: none;
            box-shadow: 0 0 5px rgba(23,162,184,0.4);
        }

        .employee-box {
            background: #fef9c3;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .employee-box:nth-child(even) {
            background: #e0f2fe;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: linear-gradient(90deg, #2a5298, #1e3c72);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            text-decoration: none;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: linear-gradient(90deg, #17a2b8, #117a8b);
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #dc3545;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
            color: #a71d2a;
        }
    </style>
    <script>
        // Prevent selecting the same employee twice
        function disableCheckbox(checkbox) {
            if (checkbox.checked) {
                checkbox.disabled = true;
            }
        }
    </script>
</head>
<body>

<div class="form-box">
    <h2>Allocate Employees to Project</h2>

    <form method="post">
        {% csrf_token %}

        <label style="color:#059669;">Select Project</label>
        <select name="project" required>
            {% for proj in projects %}
                <option value="{{ proj.id }}">
                    {{ proj.project_name }} (Required: {{ proj.max_employees }})
                </option>
            {% endfor %}
        </select>

        <hr>

        <h3>Select Employees & Assign Hours</h3>

        {% for emp in employees %}
            <div class="employee-box">
                <div>
                    <input type="checkbox" name="employees" value="{{ emp.id }}" onclick="disableCheckbox(this)">
                    {{ emp.full_name }}
                </div>
                <div>
                    <input type="number" step="0.1" name="hours_{{ emp.id }}" placeholder="Hours per week">
                </div>
            </div>
        {% endfor %}

        <button type="submit" class="btn">Allocate</button>
    </form>

    <a href="/pm-dashboard/" class="back-link">← Back to Dashboard</a>
</div>

</body>
</html>
