
<!DOCTYPE html>
<html>
<head>

<title>Allocate Employees</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.container{
width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ccc;
text-align:center;
}

th{
background:#2a5298;
color:white;
}

button{
padding:10px;
background:#2a5298;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

.error{
color:red;
}

</style>

</head>

<body>

<div class="container">

<h2>Allocate Employees to Project</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="post">

{% csrf_token %}

<label>Select Project</label>

<select name="project" required>

<option value="">Select Project</option>

{% for project in projects %}
<option value="{{ project.id }}">{{ project.project_name }}</option>
{% endfor %}

</select>

<br><br>

<h3>Employee Allocation</h3>

<table>

<tr>
<th>Select</th>
<th>Employee</th>
<th>Hours / Week</th>
</tr>

{% for emp in employees %}

<tr>

<td>
<input type="checkbox" name="employees" value="{{ emp.id }}">
</td>

<td>
{{ emp.full_name }}
</td>

<td>
<input type="number"
name="hours_{{ emp.id }}"
min="1"
max="60"
placeholder="Hours">
</td>

</tr>

{% endfor %}

</table>

<br>

<button type="submit">Allocate Employees</button>

</form>

</div>

</body>
</html>
