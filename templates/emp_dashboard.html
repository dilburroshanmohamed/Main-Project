<!DOCTYPE html>
<html>
<head>
<title>Employee Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.container{
display:flex;
}

.sidebar{
width:240px;
background:linear-gradient(180deg,#1e3c72,#2a5298);
color:white;
padding:20px;
min-height:100vh;
}

.sidebar h3{
text-align:center;
margin-bottom:25px;
}

.nav-links{
list-style:none;
padding:0;
}

.nav-links li{
margin:15px 0;
}

.nav-links a{
color:white;
text-decoration:none;
display:block;
padding:12px;
border-radius:6px;
background:rgba(255,255,255,0.1);
}

.nav-links a:hover{
background:rgba(255,255,255,0.3);
}

.content{
flex:1;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h3>Employee Panel</h3>

<ul class="nav-links">

<li><a href="{% url 'emp_profile' %}">Profile</a></li>

<li><a href="{% url 'emp_projects' %}">Assigned Projects</a></li>

<li><a href="{% url 'emp_stress_form' %}">Stress Form</a></li>

<li><a href="{% url 'emp_history' %}">Previous History</a></li>

<li><a href="/logout/">Logout</a></li>

</ul>

</div>

<div class="content">

<div class="card">

<h2>Welcome {{ profile.full_name }}</h2>

<p>Select an option from the left menu.</p>

</div>

</div>

</div>

</body>

</html>
