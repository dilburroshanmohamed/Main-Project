<!DOCTYPE html>
<html>
<head>
    <title>Employee Mental Health System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            width: 400px;
        }

        h1 {
            color: #2a5298;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 30px;
        }

        .login-btn {
            padding: 12px 30px;
            font-size: 16px;
            background-color: #2a5298;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background-color: #1e3c72;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Employee Mental Health</h1>
    <p>Industrial Stress Monitoring & Analysis System</p>

    <a href="/login/">
        <button class="login-btn">Login</button>
    </a>
</div>

</body>
</html>
